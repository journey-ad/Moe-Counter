<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moe Counter - 数据统计</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 14px;
    }
    
    .content {
      padding: 30px;
    }
    
    .search-section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    
    .search-section label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    
    .search-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .search-group {
      flex: 1;
      min-width: 200px;
    }
    
    .search-group input,
    .search-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .search-group input:focus,
    .search-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }
    
    .btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .stats-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-card:nth-child(2) {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    .stat-card:nth-child(3) {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .charts-section {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }
    
    .chart-container {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 12px;
    }
    
    .chart-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .chart-wrapper {
      position: relative;
      height: 350px;
    }
    
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .loading.show {
      display: block;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      display: none;
      background: #fee2e2;
      color: #dc2626;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .error.show {
      display: block;
    }
    
    .no-data {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    
    .no-data.show {
      display: block;
    }
    
    .no-data-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    .footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 12px;
      border-top: 1px solid #e0e0e0;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎀 Moe Counter 数据统计</h1>
      <p>查看您的计数器访问量统计数据</p>
    </div>
    
    <div class="content">
      <div class="search-section">
        <label for="counterName">计数器名称</label>
        <div class="search-row">
          <div class="search-group">
            <input type="text" id="counterName" placeholder="请输入计数器名称，例如: test" value="test">
          </div>
          <div class="search-group">
            <label for="rangeSelect">时间范围</label>
            <select id="rangeSelect">
              <option value="day">近7天</option>
              <option value="week">本周</option>
              <option value="month">本月</option>
            </select>
          </div>
          <button class="btn" id="searchBtn">查询统计</button>
        </div>
      </div>
      
      <div class="error" id="errorBox"></div>
      
      <div class="loading" id="loadingBox">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
      
      <div class="no-data" id="noDataBox">
        <div class="no-data-icon">📊</div>
        <p>暂无统计数据</p>
        <p style="margin-top: 10px; font-size: 12px;">请先访问计数器生成一些数据</p>
      </div>
      
      <div id="statsContent" style="display: none;">
        <div class="stats-summary">
          <div class="stat-card">
            <div class="stat-value" id="currentTotal">0</div>
            <div class="stat-label">总访问量</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="rangeTotal">0</div>
            <div class="stat-label">所选范围访问量</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="dateRange">-</div>
            <div class="stat-label">统计日期</div>
          </div>
        </div>
        
        <div class="charts-section">
          <div class="chart-container">
            <h3 class="chart-title">📈 访问量趋势图</h3>
            <div class="chart-wrapper">
              <canvas id="lineChart"></canvas>
            </div>
          </div>
          
          <div class="chart-container">
            <h3 class="chart-title">📊 每日访问量统计</h3>
            <div class="chart-wrapper">
              <canvas id="barChart"></canvas>
            </div>
          </div>
        </div>
      </div>
      
      <div class="footer">
        <p>Moe Counter 数据统计模块 | <a href="/">返回首页</a></p>
      </div>
    </div>
  </div>
  
  <script>
    let lineChart = null;
    let barChart = null;
    
    const counterNameInput = document.getElementById('counterName');
    const rangeSelect = document.getElementById('rangeSelect');
    const searchBtn = document.getElementById('searchBtn');
    const errorBox = document.getElementById('errorBox');
    const loadingBox = document.getElementById('loadingBox');
    const noDataBox = document.getElementById('noDataBox');
    const statsContent = document.getElementById('statsContent');
    
    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('show');
      statsContent.style.display = 'none';
      noDataBox.classList.remove('show');
    }
    
    function hideError() {
      errorBox.classList.remove('show');
    }
    
    function showLoading() {
      loadingBox.classList.add('show');
      statsContent.style.display = 'none';
      noDataBox.classList.remove('show');
      hideError();
    }
    
    function hideLoading() {
      loadingBox.classList.remove('show');
    }
    
    function showNoData() {
      noDataBox.classList.add('show');
      statsContent.style.display = 'none';
      hideError();
    }
    
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}/${day}`;
    }
    
    function getRandomColor() {
      const colors = [
        'rgba(102, 126, 234, 0.8)',
        'rgba(240, 147, 251, 0.8)',
        'rgba(79, 172, 254, 0.8)',
        'rgba(0, 242, 254, 0.8)',
        'rgba(118, 75, 162, 0.8)'
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }
    
    function createCharts(data) {
      const labels = data.daily.map(item => formatDate(item.date));
      const values = data.daily.map(item => item.count);
      
      const lineCtx = document.getElementById('lineChart').getContext('2d');
      const barCtx = document.getElementById('barChart').getContext('2d');
      
      if (lineChart) lineChart.destroy();
      if (barChart) barChart.destroy();
      
      const gradient = lineCtx.createLinearGradient(0, 0, 0, 350);
      gradient.addColorStop(0, 'rgba(102, 126, 234, 0.4)');
      gradient.addColorStop(1, 'rgba(102, 126, 234, 0.05)');
      
      lineChart = new Chart(lineCtx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '访问量',
            data: values,
            borderColor: '#667eea',
            backgroundColor: gradient,
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#667eea',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12,
              titleFont: {
                size: 14
              },
              bodyFont: {
                size: 13
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              },
              ticks: {
                stepSize: 1
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          }
        }
      });
      
      barChart = new Chart(barCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '访问量',
            data: values,
            backgroundColor: labels.map(() => getRandomColor()),
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0, 0, 0, 0.8)',
              padding: 12
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: 'rgba(0, 0, 0, 0.05)'
              },
              ticks: {
                stepSize: 1
              }
            },
            x: {
              grid: {
                display: false
              }
            }
          }
        }
      });
    }
    
    async function fetchStats() {
      const name = counterNameInput.value.trim();
      const range = rangeSelect.value;
      
      if (!name) {
        showError('请输入计数器名称');
        return;
      }
      
      showLoading();
      
      try {
        const response = await fetch(`/api/stats/${encodeURIComponent(name)}?range=${range}`);
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.message || `HTTP错误: ${response.status}`);
        }
        
        const data = await response.json();
        
        hideLoading();
        
        if (data.daily.length === 0 || data.total === 0) {
          showNoData();
          return;
        }
        
        document.getElementById('currentTotal').textContent = data.currentTotal;
        document.getElementById('rangeTotal').textContent = data.total;
        document.getElementById('dateRange').textContent = `${data.startDate.slice(5)} ~ ${data.endDate.slice(5)}`;
        
        statsContent.style.display = 'block';
        createCharts(data);
        
      } catch (error) {
        hideLoading();
        showError(`获取数据失败: ${error.message}`);
        console.error('Fetch error:', error);
      }
    }
    
    searchBtn.addEventListener('click', fetchStats);
    
    counterNameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        fetchStats();
      }
    });
    
    rangeSelect.addEventListener('change', () => {
      if (counterNameInput.value.trim()) {
        fetchStats();
      }
    });
    
    const urlParams = new URLSearchParams(window.location.search);
    const nameParam = urlParams.get('name');
    const rangeParam = urlParams.get('range');
    
    if (nameParam) {
      counterNameInput.value = nameParam;
    }
    if (rangeParam && ['day', 'week', 'month'].includes(rangeParam)) {
      rangeSelect.value = rangeParam;
    }
    
    if (nameParam) {
      fetchStats();
    }
  </script>
</body>
</html>
